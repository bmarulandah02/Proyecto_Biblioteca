<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<title>Biblioteca Personal</title>
		<!-- Bootstrap CSS -->
		<link href="Assets/bootstrap.min.css" rel="stylesheet" />
	</head>
	<body class="bg-dark text-light">
		<div class="container mt-4">
			<div class="row">
				<!-- Columna principal -->
				<div class="col-md-9">
					<h1 class="text-center mb-4">Biblioteca Personal</h1>

					<!-- Formulario -->
					<form id="formLibro" class="row g-3">
						<div class="col-md-2">
							<input
								type="text"
								id="codigo"
								class="form-control"
								placeholder="Código"
								required />
						</div>
						<div class="col-md-3">
							<input
								type="text"
								id="titulo"
								class="form-control"
								placeholder="Título"
								required />
						</div>
						<div class="col-md-3">
							<input
								type="text"
								id="autor"
								class="form-control"
								placeholder="Autor"
								required />
						</div>
						<div class="col-md-2">
							<select id="categoria" class="form-select" required>
								<option value="">Categoría...</option>
								<option value="Novela">Novela</option>
								<option value="Ciencia">Ciencia</option>
								<option value="Historia">Historia</option>
								<option value="Tecnología">Tecnología</option>
							</select>
						</div>
						<div class="col-md-2">
							<input
								type="number"
								id="Año"
								class="form-control"
								placeholder="Año"
								required />
						</div>
						<div class="col-md-2">
							<select id="estado" class="form-select">
								<option value="Disponible">Disponible</option>
								<option value="Prestado">Prestado</option>
							</select>
						</div>
						<div class="col-12">
							<button class="btn btn btn-success mb-2 w-5" type="submit" >Guardar</button>
							<button class="btn btn-secondary mb-2 w-5" type="reset" >Limpiar</button>

							<!-- Botón para abrir el panel lateral -->
							<button
								class="btn btn-info mb-2 w-5"
								type="button"
								data-bs-toggle="offcanvas"
								data-bs-target="#panelEstadisticas"
								aria-controls="panelEstadisticas">
								Mostrar Estadísticas
							</button>

							<!-- Panel lateral con offcanvas -->
							<div
								class="offcanvas offcanvas-end"
								tabindex="-1"
								id="panelEstadisticas"
								aria-labelledby="panelEstadisticasLabel">
								<div class="offcanvas-header bg-dark text-white">
									<h5 class="offcanvas-title" id="panelEstadisticasLabel">
										Estadísticas
									</h5>
									<button
										type="button"
										class="btn-close btn-close-white"
										data-bs-dismiss="offcanvas"
										aria-label="Cerrar"></button>
								</div>
								<div class="offcanvas-body text-white">
									<p>Total libros: <span id="total">0</span></p>
									<p>Disponibles: <span id="disponibles">0</span></p>
									<p>Prestados: <span id="prestados">0</span></p>
									<p>Categorías: <span id="categorias">0</span></p>
								</div>
							</div>
						</div>
					</form>

					<!-- Barra de herramientas -->
					<div class="row mt-4">
						<h4>Filtros y Ordenamiento</h4>
						<div class="col-md-4">
							<input
								type="text"
								id="buscar"
								class="form-control"
								placeholder="Buscar..." />
						</div>
						<div class="col-md-3">
							<select id="filtroCategoria" class="form-select">
								<option value="">Todas</option>
								<option value="Novela">Novela</option>
								<option value="Ciencia">Ciencia</option>
								<option value="Historia">Historia</option>
								<option value="Tecnología">Tecnología</option>
							</select>
						</div>
						<div class="col-md-3">
							<select id="filtroEstado" class="form-select">
								<option value="">Todos</option>
								<option value="Disponible">Disponible</option>
								<option value="Prestado">Prestado</option>
							</select>
						</div>
						<div class="col-md-2 d-flex gap-2">
							<button id="ordenarTitulo" class="btn btn-primary btn-sm">
								Ordenar Título
							</button>
							<button id="ordenarAño" class="btn btn-primary btn-sm">
								Ordenar Año
							</button>
						</div>
					</div>

					<!-- Tabla -->
					<table
						class="table table-striped table-hover mt-4 text-light"
						id="tablaLibros">
						<thead class="table-primary text-dark">
							<tr>
								<th>Código</th>
								<th>Título</th>
								<th>Autor</th>
								<th>Categoría</th>
								<th>Año</th>
								<th>Estado</th>
								<th>Acciones</th>
							</tr>
						</thead>
						<tbody></tbody>
					</table>
				</div>
			</div>
		</div>
		<div class="modal fade" id="modalEliminar" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content text-dark">
					<div class="modal-header bg-danger text-white">
						<h5 class="modal-title">Confirmar eliminación</h5>
						<button
							type="button"
							class="btn-close"
							data-bs-dismiss="modal"
							aria-label="Cerrar"></button>
					</div>
					<div class="modal-body">
						¿Estás seguro de que deseas eliminar este libro?
					</div>
					<div class="modal-footer">
						<button
							type="button"
							class="btn btn-secondary"
							data-bs-dismiss="modal">
							Cancelar
						</button>
						<button
							type="button"
							class="btn btn-danger"
							id="btnConfirmarEliminar">
							Eliminar
						</button>
					</div>
				</div>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
		<script src="./Assets/script.js"></script>
	</body>
</html>
